<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#eef1f5" />
  <title>QuizMaker Focus Canvas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Syne:wght@500;600;700;800&display=swap"
  />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="quiz-parser.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="app-shell">
    <input id="fileInput" type="file" accept=".json,.txt,text/plain,application/json" hidden />

    <header class="topbar">
      <button id="btnReload" class="brand-mark" aria-label="QuizMaker" title="Tạo phiên mới, hoặc Shift+Click để nạp file">
        <span>QM</span>
      </button>

      <div class="topbar-center">
        <span id="sessionState" class="status-pill">Focus Session</span>
        <div class="progress-strip" aria-label="Tiến độ phiên học">
          <span id="sessionBar"></span>
        </div>
      </div>

      <div class="topbar-actions">
        <button class="mode-toggle active" data-mode="focus">
          <span>Focus</span>
          <small>Chấm nhanh</small>
        </button>
        <button class="mode-toggle" data-mode="review">
          <span>Review</span>
          <small>Hiện đáp án</small>
        </button>
        <button class="mode-toggle" data-mode="exam">
          <span>Exam</span>
          <small>Ẩn đáp án</small>
        </button>
      </div>
    </header>

    <main class="canvas-layout">
      <aside class="flow-rail" aria-label="Tiến trình">
        <div class="rail-counter">
          <strong id="currentIndex">01</strong>
          <small id="totalCount">/ 04</small>
        </div>

        <div class="rail-progress">
          <span id="railProgressBar"></span>
        </div>

        <div id="railDots" class="rail-dots" aria-label="Điểm câu hỏi"></div>
      </aside>

      <section class="question-stage">
        <div class="stage-head">
          <div class="stage-meta">
            <span id="questionTag" class="micro-pill">Chương 2</span>
            <span id="questionTone" class="micro-pill soft">Medium</span>
            <span id="questionClock" class="micro-pill soft">45s</span>
          </div>
          <button id="btnShuffle" class="ghost-icon" title="Đảo thứ tự câu mẫu">Mix</button>
        </div>

        <div class="stage-body">
          <section class="question-panel" aria-label="Vùng câu hỏi">
            <div class="question-wrap">
              <h1 id="questionTitle">Question canvas sẽ là vùng nhìn mạnh nhất trên màn hình.</h1>
              <p id="focusNote" class="focus-note">Ít chữ phụ, ít panel nổi, ưu tiên nhịp đọc câu hỏi và chọn đáp án.</p>
            </div>
          </section>

          <section class="answer-panel" aria-label="Vùng đáp án">
            <div id="optionGrid" class="option-grid" aria-label="Các lựa chọn"></div>
          </section>
        </div>

        <footer class="stage-dock">
          <div class="dock-actions">
            <button id="btnPrev" class="dock-btn ghost">Prev</button>
            <button id="btnNext" class="dock-btn solid">Next</button>
          </div>
        </footer>
      </section>

      <aside class="queue-panel" aria-label="Queue câu hỏi">
        <div class="queue-head">
          <span class="queue-kicker">Queue</span>
          <span id="queueStat" class="queue-stat">0 / 4</span>
        </div>

        <div id="questionQueue" class="queue-list"></div>

        <div class="preset-panel">
          <button class="preset-chip" data-count="10">10 câu</button>
          <button class="preset-chip active" data-count="20">20 câu</button>
          <button class="preset-chip" data-count="40">40 câu</button>
          <button class="preset-chip" data-count="all">Tất cả</button>
        </div>
      </aside>
    </main>
  </div>
</body>
</html>
