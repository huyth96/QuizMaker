<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MLN111 – Luyện trắc nghiệm (Chế độ từng câu / hàng loạt)</title>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="app.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="logo">MLN</div>
      <div class="title">
        <h1>MLN111 – Luyện trắc nghiệm</h1>
        <p class="subtitle">Chế độ <strong>từng câu</strong> hoặc <strong>hàng loạt</strong>, lọc theo chương, xáo trộn & lưu tiến độ.</p>
      </div>
    </div>
    <div class="data-loader">
      <button id="btnFetchDefault" class="btn ghost" title="Thử tải MLN111_quiz_sources_v2.json trong cùng thư mục">Tải mặc định</button>
      <label class="btn">
        <input id="fileInput" type="file" accept=".json" hidden />
        Tải JSON
      </label>
      <span id="datasetStatus" class="badge neutral">Chưa có dữ liệu</span>
    </div>
  </header>

  <section class="controls">
    <div class="row">
      <div class="control">
        <label>Chế độ</label>
        <div class="segmented">
          <button id="modePer" class="seg active" data-mode="per">Từng câu</button>
          <button id="modeBulk" class="seg" data-mode="bulk">Hàng loạt</button>
        </div>
      </div>
      <div class="control">
        <label>Chương</label>
        <select id="chapterSelect">
          <option value="__all__">Tất cả chương</option>
        </select>
      </div>
      <div class="control">
        <label>Số câu</label>
        <input id="limitInput" type="number" min="1" step="1" value="20" />
      </div>
      <div class="control">
        <label>Tìm kiếm</label>
        <input id="searchInput" type="search" placeholder="Nhập từ khóa..." />
      </div>
      <div class="control toggles">
        <label class="switch">
          <input id="shuffleQuestions" type="checkbox" checked />
          <span class="slider"></span>
          <span class="switch-label">Xáo câu</span>
        </label>
        <label class="switch">
          <input id="shuffleOptions" type="checkbox" checked />
          <span class="slider"></span>
          <span class="switch-label">Xáo đáp án</span>
        </label>
      </div>
      <div class="control actions">
        <button id="btnStart" class="btn primary">Bắt đầu</button>
        <button id="btnReset" class="btn danger ghost">Reset</button>
      </div>
    </div>
  </section>

  <section id="meta" class="meta">
    <div class="meta-item">
      <span class="label">Tổng câu:</span>
      <span id="metaTotal" class="value">0</span>
    </div>
    <div class="meta-item">
      <span class="label">Đang hiển thị:</span>
      <span id="metaShown" class="value">0</span>
    </div>
    <div class="meta-item">
      <span class="label">Điểm (sau khi nộp / mỗi câu):</span>
      <span id="score" class="value">0 / 0</span>
    </div>
  </section>

  <main id="quiz" class="quiz"></main>

  <footer class="footer">
    <div class="footer-left">
      <button id="btnSubmitAll" class="btn accent" style="display:none;">Nộp bài (Hàng loạt)</button>
      <button id="btnRevealAll" class="btn ghost" title="Hiện đáp án đúng trên màn hình (không tính điểm)">Reveal</button>
      <button id="btnClearReveal" class="btn ghost">Ẩn reveal</button>
    </div>
    <div class="footer-right">
      <span id="footerInfo" class="muted">Nguồn: MLN111_quiz_sources_v2.json</span>
    </div>
  </footer>

</body>
</html>
